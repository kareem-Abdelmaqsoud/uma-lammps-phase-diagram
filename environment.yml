name: uma-alge-phase-diagrams

# ============================================================
# AlGe Phase Diagram — UMA-S-1.1 + LAMMPS environment
# ============================================================
#
# Tested on Linux (x86-64), May 2026.
#
# CREATE:   conda env create -f environment.yml
# ACTIVATE: conda activate uma-alge-phase-diagrams
#
# ---- Platform notes ----
# Linux / macOS:
#   - LAMMPS is installed from conda-forge (includes Python bindings).
#   - 'from lammps import lammps' works out of the box after activation.
#   - Use the nompi build (default on conda-forge); fairchem-lammps uses
#     LAMMPS as a single-process library via its external-fix callback, so
#     MPI parallelism inside LAMMPS is not needed.
#
# Windows:
#   - Remove 'lammps' from the conda dependencies below.
#   - Install the LAMMPS Windows installer from:
#       https://packages.lammps.org/windows.html
#   - Then register its Python module by running (once, after conda activation):
#       python -c "import site,os; sp=[p for p in site.getsitepackages() if 'site-packages' in p][0]; \
#         open(os.path.join(sp,'lammps_local.pth'),'w').write(r'C:\path\to\LAMMPS\Python')"
#   - Add the LAMMPS\bin directory to PATH so liblammps.dll is found.
#   - Also see activate.bat in the project for a Windows-specific activation script.
#
# ---- Model name change ----
# The scripts use "uma-s-1p1" (UMA-S-1.1). UMA-S-1.2 is not yet registered
# in the fairchem-core 2.14.0 model registry; use 1p1 until a newer release
# adds it.
#
# ---- GPU vs CPU ----
# torch==2.8.0 from PyPI includes CUDA support and also runs on CPU.
# For a CPU-only install, add --index-url https://download.pytorch.org/whl/cpu
# after the torch line.
# ============================================================

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # LAMMPS with Python bindings (Linux / macOS only — see Windows note above)
  # Pin to the nompi build; the MPI build is not needed and adds complexity.
  - lammps=2024.08.29=*nompi*

  # Core scientific stack
  - numpy>=2.0,<2.5
  - scipy>=1.15
  - matplotlib
  - pip

  - pip:
    # ---- PyTorch ----
    - torch==2.8.0

    # ---- fairchem ----
    - fairchem-core==2.14.0
    - fairchem-lammps==0.4.0

    # ---- Structure building ----
    - ase==3.26.0

    # ---- fairchem runtime dependencies (let pip resolve sub-deps) ----
    - tqdm
    - pyyaml
