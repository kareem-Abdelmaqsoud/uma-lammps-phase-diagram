name: uma-alge-phase-diagrams

# ============================================================
# AlGe Phase Diagram — UMA-S-1.2 + LAMMPS environment
# ============================================================
#
# CREATE:   conda env create -f environment.yml
# ACTIVATE: conda activate uma-alge-phase-diagrams
#
# ---- Platform notes ----
# Linux / macOS:
#   - LAMMPS is installed from conda-forge (includes Python bindings).
#   - 'from lammps import lammps' works out of the box after activation.
#
# Windows:
#   - Remove 'lammps' from the conda dependencies below.
#   - Install the LAMMPS Windows installer from:
#       https://packages.lammps.org/windows.html
#   - Then register its Python module by running (once, after conda activation):
#       python -c "import site,os; sp=[p for p in site.getsitepackages() if 'site-packages' in p][0]; \
#         open(os.path.join(sp,'lammps_local.pth'),'w').write(r'C:\path\to\LAMMPS\Python')"
#   - Add the LAMMPS\bin directory to PATH so liblammps.dll is found.
#   - Also see activate.bat in the project for a Windows-specific activation script.
#
# ---- GPU vs CPU ----
# This environment installs torch with CUDA support by default (from PyPI).
# If you need CPU-only (smaller download), replace the 'torch' pip entry with:
#   - torch==2.12.0 --index-url https://download.pytorch.org/whl/cpu
# Note: if 2.12.0 is unavailable on the CPU WHL server, just use 'torch' and PyPI
# will install the current CPU+CUDA wheel which still runs on CPU.
# ============================================================

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11

  # LAMMPS with Python bindings (Linux / macOS only — see Windows note above)
  - lammps

  # Core scientific stack via conda-forge for better solver compatibility
  - numpy>=2.0,<2.5
  - scipy>=1.15
  - matplotlib
  - pip

  - pip:
    # ---- PyTorch ----
    # Default: CUDA-capable wheel from PyPI (also runs on CPU).
    # Swap for CPU-only build if needed (see header note).
    - torch==2.12.0

    # ---- fairchem ----
    - fairchem-core==2.20.0
    - fairchem-lammps==0.4.0

    # ---- Structure building ----
    - ase==3.28.0

    # ---- fairchem runtime dependencies ----
    - ray[serve]==2.55.1
    - torchtnt==0.2.4
    - e3nn==0.6.0
    - hydra-core==1.3.2
    - huggingface-hub==1.15.0
    - lmdb==1.7.3
    - numba==0.65.1
    - monty>=2026.2.18
    - clusterscope==0.0.18
    - orjson==3.11.9
    - submitit==1.5.4
    - wandb==0.27.0
    - websockets==16.0
    - tqdm
    - pyyaml
